<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="global-auth.js"></script>
  <title>AS Multiverse — Player</title>
  <link rel="icon" href="https://i.postimg.cc/26F5zTH7/4661462-1-Mission-JEET-Logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
      color: #fff;
      overflow: hidden; /* Fullscreen, no scroll */
      display: flex;
      flex-direction: column;
      height: 100dvh; /* Mobile optimized viewport height */
    }

    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: opacity 0.3s;
    }

    #back-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    #back-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    #title {
      font-size: 1.1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100vw - 100px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    #player-container {
      position: relative;
      flex: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    #video-element {
      width: 100%;
      height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    #youtube-container {
      width: 100%;
      height: 100%;
      display: none;
    }

    #youtube-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #controls-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 20px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.3s;
      opacity: 1;
    }
    
    .hide-controls #controls-overlay,
    .hide-controls #header {
      opacity: 0;
      pointer-events: none;
    }

    .progress-container {
      position: relative;
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      cursor: pointer;
    }

    .progress-buffer {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #06b6d4);
      border-radius: 3px;
    }

    .progress-handle {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-container:hover .progress-handle {
      opacity: 1;
    }

    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .control-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: background 0.2s, transform 0.1s;
    }

    .control-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .control-btn:active {
      transform: scale(0.95);
    }

    .time-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5px;
    }

    .live-badge {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 8px #ef4444;
      animation: pulse-dot 1.5s infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    /* Overlays */
    #loading-overlay, #error-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(59, 130, 246, 0.2);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-icon {
      color: #ef4444;
      margin-bottom: 16px;
    }

    .retry-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border: none;
      padding: 10px 24px;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Settings Menu Update */
    .settings-panel {
      position: absolute;
      bottom: 80px;
      right: 20px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 0;
      min-width: 200px;
      display: none;
      z-index: 25;
      color: white;
    }
    
    .settings-panel.show {
      display: block;
      animation: fadeUp 0.2s ease;
    }

    .settings-header {
      padding: 0 16px 12px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .settings-item {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-item:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .settings-item.active {
      color: #06b6d4;
      font-weight: 600;
    }

    /* Volume Slider */
    .volume-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volume-slider {
      width: 0;
      opacity: 0;
      transition: width 0.3s, opacity 0.3s;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      height: 4px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
    }

    .volume-container:hover .volume-slider,
    .volume-slider:focus {
      width: 80px;
      opacity: 1;
    }

    /* Double Tap Zones */
    .tap-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tap-left { left: 0; }
    #tap-right { right: 0; }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .tap-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      background: rgba(0,0,0,0.5);
      padding: 12px 20px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }

    .tap-indicator.show {
      opacity: 1;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Lock Screen */
    #lock-overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
    }
    
    #lock-overlay.active {
      display: block;
    }

    #unlock-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #lock-overlay.active:active #unlock-btn,
    #lock-overlay.active:hover #unlock-btn {
      opacity: 1;
      pointer-events: auto;
    }

    /* Utilities */
    .hidden { display: none !important; }

    /* Mobile Vertical Optimization */
    @media (max-width: 600px) {
      .controls-left, .controls-right {
        gap: 8px;
      }
      .control-btn {
        width: 32px;
        height: 32px;
      }
      .volume-container {
        display: none; /* Hide volume slider on mobile portrait to save space */
      }
      .time-display {
        font-size: 0.75rem;
        white-space: nowrap;
        margin-left: auto;
      }
      #controls-overlay {
        padding: 20px 12px 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <button id="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <div id="title">Loading Video...</div>
  </div>

  <!-- Player Area -->
  <div id="player-container">
    <video id="video-element" playsinline></video>
    <div id="youtube-container"></div>
    
    <!-- Tap Zones for Mobile Seek -->
    <div id="tap-left" class="tap-zone">
      <div id="tap-ind-left" class="tap-indicator"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>10s</div>
    </div>
    <div id="tap-right" class="tap-zone">
      <div id="tap-ind-right" class="tap-indicator"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>10s</div>
    </div>

    <!-- Lock Screen Overlay -->
    <div id="lock-overlay">
      <button id="unlock-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        Tap to Unlock
      </button>
    </div>
    
    <!-- Controls Overlay -->
    <div id="controls-overlay">
      <!-- Progress Bar -->
      <div id="progress-container" class="progress-container">
        <div id="progress-buffer" class="progress-buffer" style="width: 0%"></div>
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        <div id="progress-handle" class="progress-handle" style="left: 0%"></div>
      </div>

      <!-- Controls Row -->
      <div class="controls-row">
        <div class="controls-left">
          <button id="play-pause-btn" class="control-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path id="play-icon" d="M8 5v14l11-7z" />
              <path id="pause-icon" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" class="hidden" />
            </svg>
          </button>
          
          <button id="rewind-btn" class="control-btn" title="Rewind 10s">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l5-5-5-5"></path><path d="M21 11v1a8 8 0 0 1-8 8H3"></path></svg>
            <span style="font-size: 8px; position: absolute; margin-top: 2px;">10</span>
          </button>

          <button id="forward-btn" class="control-btn" title="Forward 10s">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11l-5-5 5-5"></path><path d="M3 11v1a8 8 0 0 0 8 8h10"></path></svg>
            <span style="font-size: 8px; position: absolute; margin-top: 2px;">10</span>
          </button>

          <div class="volume-container">
            <button id="mute-btn" class="control-btn" title="Mute">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path id="vol-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <line id="mute-line" x1="1" y1="1" x2="23" y2="23" class="hidden"></line>
              </svg>
            </button>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>

          <div id="time-display" class="time-display">00:00 / 00:00</div>
          
          <div id="live-badge" class="live-badge hidden">
            <div class="live-dot"></div> LIVE
          </div>
        </div>

        <div class="controls-right">
          <button id="lock-btn" class="control-btn" title="Lock Screen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </button>

          <button id="pip-btn" class="control-btn" title="Picture in Picture">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="12" y="14" width="7" height="5" rx="1" ry="1"></rect></svg>
          </button>

          <button id="settings-btn" class="control-btn" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          </button>
          
          <button id="fullscreen-btn" class="control-btn" title="Fullscreen">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Master Settings Menu -->
    <div id="settings-menu" class="settings-panel">
      <!-- Main view -->
      <div id="settings-main">
        <div class="settings-item" id="menu-quality">
          <span style="display:flex; align-items:center; gap:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg> Quality</span>
          <span id="quality-lbl" style="color: #06b6d4;">Auto</span>
        </div>
        <div class="settings-item" id="menu-speed">
          <span style="display:flex; align-items:center; gap:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Speed</span>
          <span id="speed-lbl" style="color: #06b6d4;">Normal</span>
        </div>
      </div>
      
      <!-- Quality view -->
      <div id="settings-quality-view" class="hidden">
        <div class="settings-header" id="back-to-main-from-q">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Quality
        </div>
        <div id="quality-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Speed view -->
      <div id="settings-speed-view" class="hidden">
        <div class="settings-header" id="back-to-main-from-s">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Speed
        </div>
        <div class="settings-item speed-opt" data-speed="0.5">0.5x</div>
        <div class="settings-item speed-opt" data-speed="0.75">0.75x</div>
        <div class="settings-item speed-opt active" data-speed="1">Normal</div>
        <div class="settings-item speed-opt" data-speed="1.25">1.25x</div>
        <div class="settings-item speed-opt" data-speed="1.5">1.5x</div>
        <div class="settings-item speed-opt" data-speed="2">2.0x</div>
      </div>
    </div>

    <!-- Overlays -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p style="margin-top: 16px; color: #06b6d4; font-weight: 500; tracking: 1px;">LOADING STREAM...</p>
    </div>

    <div id="error-overlay" class="hidden">
      <svg class="error-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;">Playback Error</h2>
      <p id="error-msg" style="color: #9ca3af; text-align: center; max-width: 80%;">Failed to load video stream.</p>
      <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
  </div>

  <script>
    // Elements
    const video = document.getElementById('video-element');
    const youtubeContainer = document.getElementById('youtube-container');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const muteBtn = document.getElementById('mute-btn');
    const volWaves = document.getElementById('vol-waves');
    const muteLine = document.getElementById('mute-line');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const progressBuffer = document.getElementById('progress-buffer');
    const progressHandle = document.getElementById('progress-handle');
    const timeDisplay = document.getElementById('time-display');
    const liveBadge = document.getElementById('live-badge');
    const settingsMenu = document.getElementById('settings-menu');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const playerContainer = document.getElementById('player-container');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorOverlay = document.getElementById('error-overlay');
    const errorMsg = document.getElementById('error-msg');

    const volumeSlider = document.getElementById('volume-slider');
    const lockBtn = document.getElementById('lock-btn');
    const pipBtn = document.getElementById('pip-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsMain = document.getElementById('settings-main');
    const settingsQView = document.getElementById('settings-quality-view');
    const settingsSView = document.getElementById('settings-speed-view');
    const tapLeft = document.getElementById('tap-left');
    const tapRight = document.getElementById('tap-right');
    const lockOverlay = document.getElementById('lock-overlay');
    const unlockBtn = document.getElementById('unlock-btn');
    const qualityLbl = document.getElementById('quality-lbl');
    const speedLbl = document.getElementById('speed-lbl');

    let shakaPlayer = null;
    let isLive = false;
    let controlsTimeout;

    // Formatting Time
    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "00:00";
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // Auto-hide controls
    function resetControlsHide() {
      if (document.body.classList.contains('locked')) return;
      document.body.classList.remove('hide-controls');
      clearTimeout(controlsTimeout);
      controlsTimeout = setTimeout(() => {
        if (!video.paused) {
          document.body.classList.add('hide-controls');
          if (settingsMenu) settingsMenu.classList.remove('show');
        }
      }, 3000);
    }

    document.addEventListener('mousemove', resetControlsHide);
    document.addEventListener('touchstart', resetControlsHide);

    // Update UI
    function updatePlayPauseUI() {
      if (video.paused) {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
      } else {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      }
    }

    function updateMuteUI() {
      if (video.muted) {
        volWaves.classList.add('hidden');
        muteLine.classList.remove('hidden');
      } else {
        volWaves.classList.remove('hidden');
        muteLine.classList.add('hidden');
      }
    }

    // Events
    playPauseBtn.addEventListener('click', () => {
      video.paused ? video.play() : video.pause();
    });

    video.addEventListener('play', updatePlayPauseUI);
    video.addEventListener('pause', updatePlayPauseUI);

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      updateMuteUI();
    });

    document.getElementById('rewind-btn').addEventListener('click', () => { video.currentTime -= 10; });
    document.getElementById('forward-btn').addEventListener('click', () => { video.currentTime += 10; });

    video.addEventListener('timeupdate', () => {
      if (isLive) return;
      const pct = (video.currentTime / video.duration) * 100 || 0;
      progressFill.style.width = `${pct}%`;
      progressHandle.style.left = `${pct}%`;
      timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
      
      // Buffer
      if (video.buffered.length > 0) {
        const buffPct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
        progressBuffer.style.width = `${buffPct}%`;
      }
    });

    progressContainer.addEventListener('click', (e) => {
      if (isLive) return;
      const rect = progressContainer.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      video.currentTime = pos * video.duration;
    });

    // Settings Routing
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMain.classList.remove('hidden');
      settingsQView.classList.add('hidden');
      settingsSView.classList.add('hidden');
      settingsMenu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
      if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
        settingsMenu.classList.remove('show');
      }
    });

    document.getElementById('menu-quality').addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMain.classList.add('hidden');
      settingsQView.classList.remove('hidden');
    });

    document.getElementById('menu-speed').addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMain.classList.add('hidden');
      settingsSView.classList.remove('hidden');
    });

    document.getElementById('back-to-main-from-q').addEventListener('click', (e) => {
      e.stopPropagation();
      settingsQView.classList.add('hidden');
      settingsMain.classList.remove('hidden');
    });

    document.getElementById('back-to-main-from-s').addEventListener('click', (e) => {
      e.stopPropagation();
      settingsSView.classList.add('hidden');
      settingsMain.classList.remove('hidden');
    });

    document.querySelectorAll('.speed-opt').forEach(item => {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        const speed = parseFloat(item.dataset.speed);
        video.playbackRate = speed;
        speedLbl.textContent = speed === 1 ? 'Normal' : `${speed}x`;
        document.querySelectorAll('.speed-opt').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        settingsMenu.classList.remove('show');
      });
    });

    // Volume Slider
    volumeSlider.addEventListener('input', (e) => {
      video.volume = e.target.value;
      if (video.volume === 0) video.muted = true;
      else video.muted = false;
      updateMuteUI();
    });

    // Double Tap to Seek
    function showRipple(zone) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.width = '100px';
      ripple.style.height = '100px';
      zone.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    let tapLeftTime = 0;
    tapLeft.addEventListener('click', () => {
      const now = Date.now();
      if (now - tapLeftTime < 300) {
        video.currentTime -= 10;
        showRipple(tapLeft);
        const ind = document.getElementById('tap-ind-left');
        ind.classList.add('show');
        setTimeout(() => ind.classList.remove('show'), 500);
      }
      tapLeftTime = now;
    });

    let tapRightTime = 0;
    tapRight.addEventListener('click', () => {
      const now = Date.now();
      if (now - tapRightTime < 300) {
        video.currentTime += 10;
        showRipple(tapRight);
        const ind = document.getElementById('tap-ind-right');
        ind.classList.add('show');
        setTimeout(() => ind.classList.remove('show'), 500);
      }
      tapRightTime = now;
    });

    // Lock Screen
    lockBtn.addEventListener('click', () => {
      document.body.classList.add('locked', 'hide-controls');
      lockOverlay.classList.add('active');
    });

    unlockBtn.addEventListener('click', () => {
      document.body.classList.remove('locked');
      lockOverlay.classList.remove('active');
      resetControlsHide();
    });

    // Picture in Picture
    pipBtn.addEventListener('click', async () => {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
      } else if (document.pictureInPictureEnabled && !video.disablePictureInPicture) {
        await video.requestPictureInPicture().catch(console.error);
      } else {
        alert("Picture-in-Picture is not supported in your browser.");
      }
    });

    // Fullscreen (iOS compatible)
    function toggleFullscreen() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (playerContainer.requestFullscreen) {
          playerContainer.requestFullscreen().catch(e=>console.log(e));
        } else if (playerContainer.webkitRequestFullscreen) {
          playerContainer.webkitRequestFullscreen();
        } else if (video.webkitEnterFullscreen) {
          video.webkitEnterFullscreen(); // iOS native player fallback
        }
        if(screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        if(screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
      }
    }
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
      if (e.code === 'ArrowLeft') { video.currentTime -= 10; resetControlsHide(); }
      if (e.code === 'ArrowRight') { video.currentTime += 10; resetControlsHide(); }
      if (e.code === 'KeyF') fullscreenBtn.click();
      if (e.code === 'KeyM') muteBtn.click();
    });

    // Init Logic
    async function init() {
      const params = new URLSearchParams(location.search);
      const url = params.get('url');
      const title = params.get('title') || 'MissionJEET Video';
      isLive = params.get('live') === '1';

      document.getElementById('title').textContent = title;

      if (isLive) {
        timeDisplay.classList.add('hidden');
        progressContainer.classList.add('hidden');
        liveBadge.classList.remove('hidden');
      }

      if (!url) {
        loadingOverlay.classList.add('hidden');
        errorOverlay.classList.remove('hidden');
        errorMsg.textContent = "No video URL provided.";
        return;
      }

      try {
        if (/youtube\.com|youtu\.be/.test(url)) {
          // Embed YouTube
          loadingOverlay.classList.add('hidden');
          video.classList.add('hidden');
          youtubeContainer.style.display = 'block';
          
          let videoId = '';
          if (url.includes('v=')) videoId = new URL(url).searchParams.get('v');
          else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
          else if (url.includes('embed/')) videoId = url.split('embed/')[1].split('?')[0];

          youtubeContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
          
        } else if (url.includes('.m3u8') || url.includes('.mpd')) {
          // Shaka Player
          shaka.polyfill.installAll();
          if (shaka.Player.isBrowserSupported()) {
            shakaPlayer = new shaka.Player(video);
            shakaPlayer.addEventListener('error', (err) => {
              console.error('Shaka Error', err);
              errorOverlay.classList.remove('hidden');
              errorMsg.textContent = "Error playing secure stream.";
            });
            await shakaPlayer.load(url);
            loadingOverlay.classList.add('hidden');
            video.play().catch(()=>{});
            
            // Build Quality Menu
            buildQualityMenu();
          } else {
            throw new Error("Browser not supported for DRM/HLS.");
          }
        } else {
          // Native
          video.src = url;
          video.addEventListener('loadeddata', () => {
            loadingOverlay.classList.add('hidden');
            video.play().catch(()=>{});
          });
          video.addEventListener('error', () => {
            loadingOverlay.classList.add('hidden');
            errorOverlay.classList.remove('hidden');
          });
        }
      } catch (err) {
        console.error(err);
        loadingOverlay.classList.add('hidden');
        errorOverlay.classList.remove('hidden');
        errorMsg.textContent = err.message || "Failed to load stream.";
      }
      resetControlsHide();
    }
    
    function buildQualityMenu() {
      if (!shakaPlayer) return;
      const tracks = shakaPlayer.getVariantTracks();
      const qList = document.getElementById('quality-list');
      qList.innerHTML = '';
      
      const autoDiv = document.createElement('div');
      autoDiv.className = 'settings-item active';
      autoDiv.textContent = 'Auto';
      autoDiv.onclick = (e) => {
        e.stopPropagation();
        shakaPlayer.configure({ abr: { enabled: true } });
        qualityLbl.textContent = 'Auto';
        document.querySelectorAll('#quality-list .settings-item').forEach(i=>i.classList.remove('active'));
        autoDiv.classList.add('active');
        settingsMenu.classList.remove('show');
      };
      qList.appendChild(autoDiv);

      const uniqueHeights = [...new Set(tracks.map(t => t.height))].filter(Boolean).sort((a,b)=>b-a);
      uniqueHeights.forEach(h => {
        const div = document.createElement('div');
        div.className = 'settings-item';
        div.textContent = h + 'p';
        div.onclick = (e) => {
          e.stopPropagation();
          shakaPlayer.configure({ abr: { enabled: false } });
          const track = shakaPlayer.getVariantTracks().find(t => t.height === h);
          if(track) shakaPlayer.selectVariantTrack(track, true);
          qualityLbl.textContent = h + 'p';
          document.querySelectorAll('#quality-list .settings-item').forEach(i=>i.classList.remove('active'));
          div.classList.add('active');
          settingsMenu.classList.remove('show');
        };
        qList.appendChild(div);
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
