    body {
      background-color: var(--bg-primary);

    /* Background Effects */

    .glass-card {

    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);

      margin-bottom: 12px;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9375rem;

      margin-bottom: 32px;
    }

      display: none;

    }

<body>
  <div class="bg-particles">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="glass-card">
    <img src="https://nexttoppers.asmultiverse.in/logo.png" alt="Logo" class="logo-img">
    
    <!-- MAIN SCREEN -->
    <div id="step-1" class="step active">
      <h1 class="gradient-text" id="main-title">As Multiverse</h1>
      <p class="subtitle" id="main-subtitle">Generate a new access code to unlock 24 hours of premium content.</p>
      
      <button id="btn-generate" class="btn btn-accent" style="margin-bottom: 24px;">
        <span>Get Access Code</span>
      </button>



      <div id="divider" style="display: flex; align-items: center; margin-bottom: 24px; opacity: 0.5;">
        <div style="flex-grow: 1; border-top: 1px solid var(--border-subtle);"></div>
        <span style="margin: 0 16px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase;">OR ENTER CODE</span>
        <div style="flex-grow: 1; border-top: 1px solid var(--border-subtle);"></div>
      </div>

      <input type="text" id="code-input" class="code-input" placeholder="ASMV-XXXXXX" autocomplete="off" onclick="if(this.value){ this.select(); navigator.clipboard.writeText(this.value); const original = this.value; this.value = 'Copied!'; setTimeout(() => this.value = original, 1500); }" title="Click to copy">
      
      <div class="flex flex-col gap-3">
        <button id="btn-verify" class="btn btn-primary">
          Verify & Activate
        </button>
        <button id="btn-copy" class="btn btn-accent" style="display: none;">
          Copy Code
        </button>
        <button id="btn-open-app" class="btn btn-outline" style="display: none;">
          Return to App
        </button>
      </div>
    </div>


    <!-- STEP 3: Success -->
    <div id="step-3" class="step">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h1 class="gradient-text">Access Granted</h1>
      <p class="subtitle">You have unrestricted access until the timer runs out.</p>
      
      <div id="timer-display" class="timer">24:00:00</div>
      
      <button id="btn-enter" onclick="const ret = localStorage.getItem('auth_return_url'); if(ret) { localStorage.removeItem('auth_return_url'); window.location.href = ret; } else { window.location.href='index.html'; }" class="btn btn-accent mt-4">
        Enter Mission JEET
      </button>
    </div>
  </div>

  <script>
    const MASTER_KEYS = ['ADMIN2026', 'VIPPASS', 'LO-IS-KING', 'GODMODE'];
    const ACCESS_KEY = 'multiverse_access_expiry';
    const PENDING_KEY = 'pending_auth_code';
    let timerInterval;

    function init() {
      // Check URL for code param FIRST so admins can see generated codes even if they have an active session
      const urlParams = new URLSearchParams(window.location.search);
      const codeParam = urlParams.get('code');
      const autoVerify = urlParams.get('auto_verify');

      // Check for existing valid token if no code is in URL
      const expiry = localStorage.getItem(ACCESS_KEY);
      if (expiry && parseInt(expiry, 10) > Date.now() && !codeParam) {
        showStep(3);
        startTimer(parseInt(expiry, 10));
        return;
      }
      
      if (codeParam) {
        document.getElementById('code-input').value = codeParam;
        
        // If returning via app intent, auto verify
        if (autoVerify === 'true') {
            grantAccess();
            return;
        }
        
        // Attempt to auto-redirect back to the app, but don't break the web flow
        if (/android/i.test(navigator.userAgent)) {
            window.location.href = `intent://auth?code=${codeParam}#Intent;scheme=pwapp;package=com.pw.app;end;`;
        }
        
        // Emphasize copying the code in case redirect fails
        document.getElementById('main-title').textContent = 'Your Access Code';
        document.getElementById('main-subtitle').textContent = 'Tap the code to copy it, or click Verify & Activate to unlock the site.';
        document.getElementById('btn-copy').style.display = 'none'; // Built into the input now
        document.getElementById('btn-open-app').style.display = 'flex'; // Show return to app button
        
        // DO NOT hide btn-generate, divider, or btn-verify so web users can still use the page
        
        showStep(1);
      }
    }

    // New button listeners
    document.getElementById('btn-copy').addEventListener('click', async (e) => {
      const code = document.getElementById('code-input').value;
      const btn = e.currentTarget;
      const originalText = btn.innerHTML;
      
      try {
        await navigator.clipboard.writeText(code);
        btn.innerHTML = 'Copied!';
      } catch(err) {
        const input = document.getElementById('code-input');
        input.select();
        document.execCommand('copy');
        btn.innerHTML = 'Copied!';
      }
      setTimeout(() => btn.innerHTML = originalText, 2000);
    });

    document.getElementById('btn-open-app').addEventListener('click', () => {
      const code = document.getElementById('code-input').value;
      window.location.href = `intent://auth?code=${code}#Intent;scheme=pwapp;package=com.pw.app;end;`;
      setTimeout(() => {
        alert('If the app didn\'t open automatically, please manually return to it and paste the code.');
      }, 1000);
    });

    function showStep(stepNum) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById(`step-${stepNum}`).classList.add('active');
    }

    function generateCode() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let randomPart = '';
      for (let i = 0; i < 6; i++) {
        randomPart += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return 'ASMV-' + randomPart;
    }

    document.getElementById('btn-generate').addEventListener('click', () => {
      window.location.href = 'tutorial.html';
    });



    document.getElementById('btn-verify').addEventListener('click', () => {
      const input = document.getElementById('code-input').value.trim().toUpperCase();
      const pendingCode = localStorage.getItem(PENDING_KEY);

      if (!input) return;

      if (MASTER_KEYS.includes(input)) {
        grantAccess();
      } else if (pendingCode && input === pendingCode) {
        localStorage.removeItem(PENDING_KEY);
        grantAccess();
      } else {
        alert('Access Denied: Code is invalid or was generated on a different device.');
      }
    });

    function grantAccess() {
      const expiry = Date.now() + (24 * 60 * 60 * 1000); // 24 hours
      localStorage.setItem(ACCESS_KEY, expiry.toString());
      
      // Clear URL params
      window.history.replaceState({}, document.title, window.location.pathname);
      
      showStep(3);
      startTimer(expiry);

      // Auto-redirect after 1.5 seconds so they don't even have to click
      setTimeout(() => {
        const ret = localStorage.getItem('auth_return_url');
        if (ret) {
          localStorage.removeItem('auth_return_url');
          window.location.href = ret;
        } else {
          window.location.href = 'index.html';
        }
      }, 1500);
    }

    function startTimer(expiryTime) {
      if (timerInterval) clearInterval(timerInterval);
      
      const display = document.getElementById('timer-display');
      
      function update() {
        const now = Date.now();
        const diff = expiryTime - now;
        
        if (diff <= 0) {
          clearInterval(timerInterval);
          localStorage.removeItem(ACCESS_KEY);
          window.location.reload();
          return;
        }
        
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        
        display.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      
      update();
      timerInterval = setInterval(update, 1000);
    }

    // Initialize
    init();
  </script>
</body>
